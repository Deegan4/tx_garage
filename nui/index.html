<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tx_garage</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app" class="hidden">

        <!-- ─────────── Garage View ─────────── -->
        <section id="garage-view" class="view hidden" aria-labelledby="garage-label">
            <header class="header">
                <div class="title">
                    <span class="badge" id="garage-type">PUBLIC</span>
                    <h1 id="garage-label">Garage</h1>
                </div>
                <div class="header-actions">
                    <input type="search" id="search-input" class="search" placeholder="Search vehicles…" autocomplete="off" />
                    <button type="button" class="close-btn" data-action="close" aria-label="Close">✕</button>
                </div>
            </header>

            <div class="actions">
                <button type="button" class="btn primary" id="btn-store">
                    <span class="icon">▼</span><span>Store Current Vehicle</span>
                </button>
                <button type="button" class="btn secondary" id="btn-valet">
                    <span class="icon">◐</span><span>Call Valet</span>
                </button>
                <button type="button" class="btn ghost" id="btn-boss" hidden>
                    <span class="icon">★</span><span>Boss Menu</span>
                </button>
            </div>

            <div class="vehicle-grid" id="vehicle-grid"></div>

            <div class="empty-state hidden" id="empty-state">
                <div class="empty-icon">▤</div>
                <p>No vehicles stored here.</p>
            </div>
        </section>

        <!-- ─────────── Auction View ─────────── -->
        <section id="auction-view" class="view hidden" aria-labelledby="auction-label">
            <header class="header">
                <div class="title">
                    <span class="badge auction">AUCTION</span>
                    <h1 id="auction-label">Impound Auction House</h1>
                </div>
                <button type="button" class="close-btn" data-action="close" aria-label="Close">✕</button>
            </header>

            <div class="auction-grid" id="auction-grid"></div>

            <div class="empty-state hidden" id="auction-empty">
                <div class="empty-icon">▽</div>
                <p>No active auctions right now.</p>
            </div>
        </section>

        <!-- ─────────── Sub-owner Modal ─────────── -->
        <div id="subowner-modal" class="modal hidden" role="dialog" aria-modal="true">
            <div class="modal-card">
                <header class="modal-header">
                    <h2>Sub-owners</h2>
                    <button type="button" class="close-btn" data-action="close-modal">✕</button>
                </header>
                <p class="muted">Players who can retrieve, store, and call valet for this vehicle.</p>
                <ul id="subowner-list" class="subowner-list"></ul>
                <div class="modal-actions">
                    <button type="button" class="btn primary" id="btn-add-subowner">+ Add Sub-owner</button>
                </div>
            </div>
        </div>

        <!-- ─────────── Boss Menu Modal ─────────── -->
        <div id="boss-modal" class="modal hidden" role="dialog" aria-modal="true">
            <div class="modal-card">
                <header class="modal-header">
                    <h2>Boss Menu</h2>
                    <button type="button" class="close-btn" data-action="close-modal">✕</button>
                </header>
                <div class="boss-balance">
                    <span class="muted">Society balance</span>
                    <span class="big-money" id="boss-balance-value">—</span>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn primary" id="btn-boss-deposit">Deposit</button>
                    <button type="button" class="btn secondary" id="btn-boss-withdraw">Withdraw</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
