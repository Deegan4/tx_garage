<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 480" width="1920" height="480">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff2d6b"/>
      <stop offset="40%"  stop-color="#a347ff"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
    <linearGradient id="accentTL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff2d6b" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff2d6b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentBR" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#00f0ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base sunset gradient -->
  <rect width="1920" height="480" fill="url(#g)"/>

  <!-- Art-deco corner accents (mirrors the in-game NUI) -->
  <polygon points="0,0 220,0 0,220" fill="url(#accentTL)"/>
  <polygon points="1920,480 1700,480 1920,260" fill="url(#accentBR)"/>

  <!-- Subtle scanlines for premium texture -->
  <g opacity="0.05" fill="#000">
    <rect x="0" y="0"   width="1920" height="2"/>
    <rect x="0" y="478" width="1920" height="2"/>
  </g>

  <!-- Wordmark -->
  <text x="960" y="200" font-family="Helvetica,Arial,sans-serif" font-weight="900" font-size="180" fill="#fff" text-anchor="middle" letter-spacing="-4">tx_garage</text>

  <!-- Version pill -->
  <g transform="translate(960,240)">
    <rect x="-78" y="-22" width="156" height="38" rx="8" fill="#0a0e2c" opacity="0.55"/>
    <text x="0" y="6" font-family="Helvetica,Arial,sans-serif" font-weight="800" font-size="22" fill="#fff" text-anchor="middle" letter-spacing="3">v2.0 · QBOX</text>
  </g>

  <!-- Tagline -->
  <text x="960" y="320" font-family="Helvetica,Arial,sans-serif" font-weight="500" font-size="34" fill="#fff" opacity="0.92" text-anchor="middle" letter-spacing="5">VALET · LIVE AUCTIONS · SUB-OWNERS · BOSS MENU</text>

  <!-- Audit credential -->
  <g transform="translate(960,395)">
    <rect x="-220" y="-22" width="440" height="40" rx="20" fill="#0a0e2c" opacity="0.5"/>
    <circle cx="-188" cy="-2" r="6" fill="#00ffa3"/>
    <text x="-170" y="6" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="20" fill="#fff" letter-spacing="2">SECURITY-AUDITED · 16 FIXES SHIPPED</text>
  </g>
</svg>
